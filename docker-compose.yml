version: '5.1.3'
services:
  # fe-app:
  #   image: fe-container:first
  #   ports:
  #     - '80:80'
  #   depends_on:
  #     - nest-app
  #   networks:
  #     - common-network

  nest-app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mysql-container
      - redis-container
    ports:
      - '3000:3000'
    restart: always
    networks:
      - common-network

  mysql-container:
    image: mysql:latest
    volumes:
      - /Users/chanweiyan/Desktop/mysql-docker-data:/var/lib/mysql
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci # 设置默认字符集
    environment:
      MYSQL_ROOT_USER: root
      MYSQL_ROOT_PASSWORD: Cwy17824
      MYSQL_DATABASE: meeting_room_booking_system
    ports:
      - '3306:3306'
    restart: always
    networks:
      - common-network

  redis-container:
    image: redis:latest
    ports:
      - '6379:6379'
    volumes:
      - /Users/chanweiyan/Desktop/redis-docker-data:/data
    restart: always
    networks:
      - common-network

networks:
  common-network:
    driver: bridge